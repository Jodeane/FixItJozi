{% extends 'core/base.html' %} {% block content %}
<div class="container">
  <h2 style="text-align: center">📊 Dashboard Analytics</h2>

  <div class="grid">
    <div class="box">
      <h3>Total Reports</h3>
      <p style="font-size: 30px">{{ total_reports }}</p>
    </div>
  </div>

  <br /><br />

  <div class="card">
    <canvas id="barChart"></canvas>
  </div>

  <br /><br />

  <div class="card">
    <canvas id="pieChart"></canvas>
  </div>
</div>

<script>
  const labels = JSON.parse("{{ labels|escapejs }}");
  const data = JSON.parse("{{ data|escapejs }}");

  // BAR CHART
  new Chart(document.getElementById("barChart"), {
    type: "bar",
    data: {
      labels: labels,
      datasets: [
        {
          label: "Reports by Type",
          data: data,
        },
      ],
    },
  });

  // PIE CHART
  new Chart(document.getElementById("pieChart"), {
    type: "pie",
    data: {
      labels: labels,
      datasets: [
        {
          data: data,
        },
      ],
    },
  });
</script>

{% endblock %}
