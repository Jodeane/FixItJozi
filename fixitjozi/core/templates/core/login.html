{% extends 'core/base.html' %} {% block content %}

<div class="login-wrap">
  <!-- LEFT PANEL: Visual / branding -->
  <div class="login-left">
    <div class="login-left-inner">
      <div class="login-brand-mark">
        <span class="material-icons-round">build_circle</span>
      </div>

      <h2 class="login-left-title">
        Joburg needs<br />
        <span class="login-left-accent">your voice.</span>
      </h2>

      <p class="login-left-sub">
        Every report you submit helps the city respond faster.
      </p>

      <!-- Trust indicators -->
      <div class="login-trust"></div>
    </div>
  </div>

  <!-- RIGHT PANEL: Form -->
  <div class="login-right">
    <div class="login-form-wrap">
      <div class="login-form-header">
        <h2 class="login-form-title">
          Sign In <span class="login-or-sep">/</span> Create Account
        </h2>
      </div>

      <form method="POST" class="login-form">
        {% csrf_token %}
        <input type="hidden" name="language" value="{{ language }}" />

        <!-- Phone -->
        <div class="form-field">
          <label class="form-label">
            <span class="material-icons-round">phone_android</span>
            Phone Number <span class="form-required">*</span>
          </label>
          <div class="form-input-wrap">
            <span class="form-input-prefix">+27</span>
            <input
              type="text"
              name="phone"
              required
              class="form-input form-input-prefixed"
            />
          </div>
        </div>

        <!-- Email -->
        <div class="form-field">
          <label class="form-label">
            <span class="material-icons-round">mail_outline</span>
            Email <span class="form-optional">(optional)</span>
          </label>
          <input type="email" name="email" class="form-input" />
        </div>

        <!-- Password -->
        <div class="form-field">
          <label class="form-label">
            <span class="material-icons-round">lock_outline</span>
            Password <span class="form-required">*</span>
          </label>
          <div class="form-input-wrap form-input-password">
            <input
              type="password"
              name="password"
              id="passwordInput"
              required
              class="form-input"
            />
            <button
              type="button"
              class="form-eye-toggle"
              onclick="togglePassword()"
            >
              <span class="material-icons-round" id="eyeIcon">visibility</span>
            </button>
          </div>
        </div>

        <button type="submit" class="login-submit-btn">
          <span class="material-icons-round">login</span>
          Create Account / Sign In
        </button>
      </form>

      <!-- Divider -->
      <div class="login-divider">
        <span class="login-divider-line"></span>
        <span class="login-divider-text">or continue with</span>
        <span class="login-divider-line"></span>
      </div>

      <!-- Social buttons -->
      <div class="social-btns">
        <button type="button" class="social-btn">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path
              d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"
              fill="#4285F4"
            />
            <path
              d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"
              fill="#34A853"
            />
            <path
              d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"
              fill="#FBBC05"
            />
            <path
              d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"
              fill="#EA4335"
            />
          </svg>
          Google
        </button>
        <button type="button" class="social-btn">
          <svg width="18" height="18" viewBox="0 0 23 23" fill="none">
            <path
              d="M1 1h10v10H1zM12 1h10v10H12zM1 12h10v10H1zM12 12h10v10H12z"
              fill="#fff"
              opacity=".7"
            />
          </svg>
          Microsoft
        </button>
        <button type="button" class="social-btn">
          <svg width="18" height="18" viewBox="0 0 814 1000" fill="none">
            <path
              d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46.7 790.7 0 663 0 541.8c0-194.3 127.4-297.5 252.2-297.5 66.1 0 121.2 43.4 162.6 43.4 39.5 0 101.1-46 176.3-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"
              fill="#fff"
              opacity=".8"
            />
          </svg>
          Apple
        </button>
      </div>
    </div>
  </div>
</div>

<style>
  /* ── LOGIN PAGE ── */
  .login-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: calc(100vh - 70px);
  }

  /* LEFT */
  .login-left {
    background: linear-gradient(145deg, #0f0f1a 0%, #0a0a0f 100%);
    border-right: 1px solid rgba(255, 255, 255, 0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(40px, 6vw, 80px);
    position: relative;
    overflow: hidden;
  }

  .login-left::before {
    content: "";
    position: absolute;
    top: -20%;
    left: -20%;
    width: 60%;
    height: 60%;
    background: radial-gradient(
      ellipse,
      rgba(250, 204, 21, 0.07) 0%,
      transparent 70%
    );
    pointer-events: none;
  }

  .login-left-inner {
    position: relative;
    z-index: 1;
    max-width: 380px;
  }

  .login-brand-mark {
    width: 52px;
    height: 52px;
    background: #facc15;
    border-radius: 14px;
    display: grid;
    place-items: center;
    color: #0a0a0f;
    margin-bottom: 28px;
  }
  .login-brand-mark .material-icons-round {
    font-size: 26px;
  }

  .login-left-title {
    font-family: "Syne", sans-serif;
    font-size: clamp(2rem, 3.5vw, 3rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.04em;
    color: #f0f0f5;
    margin-bottom: 16px;
  }
  .login-left-accent {
    color: #facc15;
  }

  .login-left-sub {
    color: #7a7a8c;
    font-size: 0.95rem;
    line-height: 1.7;
    margin-bottom: 32px;
  }

  /* Mini map preview */
  .login-map-preview {
    position: relative;
    width: 100%;
    height: 160px;
    background: #111118;
    border: 1px solid rgba(255, 255, 255, 0.07);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .lmp-grid {
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 19px,
        rgba(255, 255, 255, 0.02) 20px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 19px,
        rgba(255, 255, 255, 0.02) 20px
      );
  }
  .lmp-dot {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .lmp-d1 {
    top: 35%;
    left: 45%;
    background: #facc15;
    box-shadow: 0 0 8px #facc15;
  }
  .lmp-d2 {
    top: 55%;
    left: 62%;
    background: #f97316;
    box-shadow: 0 0 8px #f97316;
  }
  .lmp-d3 {
    top: 25%;
    left: 70%;
    background: #38bdf8;
    box-shadow: 0 0 8px #38bdf8;
  }
  .lmp-d4 {
    top: 65%;
    left: 30%;
    background: #facc15;
    box-shadow: 0 0 8px #facc15;
  }
  .lmp-pulse {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .lmp-pulse::after {
    content: "";
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 1.5px solid #facc15;
    animation: ping 2s ease infinite;
  }
  .lmp-p1 {
    top: 35%;
    left: 45%;
  }
  .lmp-p2 {
    top: 65%;
    left: 30%;
  }
  .lmp-p2::after {
    animation-delay: 1s;
  }
  .lmp-label {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(10, 10, 15, 0.8);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 100px;
    padding: 5px 12px;
    font-size: 0.75rem;
    color: #7a7a8c;
    white-space: nowrap;
  }
  .lmp-label .material-icons-round {
    font-size: 13px;
    color: #facc15;
  }

  .login-trust {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .trust-item {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #7a7a8c;
    font-size: 0.85rem;
  }
  .trust-item .material-icons-round {
    font-size: 16px;
    color: #facc15;
  }

  .login-right {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(40px, 6vw, 80px);
    background: #0a0a0f;
  }

  .login-form-wrap {
    width: 100%;
    max-width: 420px;
  }

  .login-form-header {
    margin-bottom: 32px;
  }
  .login-form-title {
    font-family: "Syne", sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: #f0f0f5;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  .login-or-sep {
    color: rgba(250, 204, 21, 0.5);
  }
  .login-form-sub {
    color: #7a7a8c;
    font-size: 0.88rem;
    line-height: 1.6;
  }

  .login-form {
    display: flex;
    flex-direction: column;
    gap: 18px;
    margin-bottom: 24px;
  }

  .form-field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .form-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.82rem;
    font-weight: 600;
    color: #a0a0b0;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .form-label .material-icons-round {
    font-size: 15px;
    color: #facc15;
  }
  .form-required {
    color: #f97316;
  }
  .form-optional {
    color: #3a3a4a;
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    font-size: 0.78rem;
  }

  .form-input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  .form-input-prefix {
    position: absolute;
    left: 14px;
    font-size: 0.9rem;
    color: #facc15;
    font-weight: 600;
    pointer-events: none;
  }
  .form-input-prefixed {
    padding-left: 46px !important;
  }

  .form-input {
    width: 100%;
    padding: 14px 16px;
    background: #111118;
    border: 1.5px solid rgba(255, 255, 255, 0.08);
    border-radius: 11px;
    color: #f0f0f5;
    font-family: "DM Sans", sans-serif;
    font-size: 0.95rem;
    transition:
      border-color 0.2s,
      box-shadow 0.2s;
  }
  .form-input:focus {
    outline: none;
    border-color: #facc15;
    box-shadow: 0 0 0 3px rgba(250, 204, 21, 0.1);
  }
  .form-input::placeholder {
    color: #3a3a4a;
  }

  .form-input-password {
    position: relative;
  }
  .form-input-password .form-input {
    padding-right: 48px;
  }
  .form-eye-toggle {
    position: absolute;
    right: 14px;
    background: none;
    border: none;
    cursor: pointer;
    color: #3a3a4a;
    padding: 4px;
    display: flex;
    align-items: center;
    transition: color 0.2s;
    box-shadow: none;
    transform: none;
  }
  .form-eye-toggle:hover {
    color: #facc15;
    transform: none;
    box-shadow: none;
  }
  .form-eye-toggle .material-icons-round {
    font-size: 18px;
  }

  .login-submit-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: #facc15;
    color: #0a0a0f;
    border: none;
    cursor: pointer;
    padding: 15px;
    border-radius: 11px;
    font-family: "Syne", sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    transition:
      transform 0.2s,
      box-shadow 0.2s;
  }
  .login-submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 32px rgba(250, 204, 21, 0.35);
  }
  .login-submit-btn .material-icons-round {
    font-size: 20px;
  }

  .login-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .login-divider-line {
    flex: 1;
    height: 1px;
    background: rgba(255, 255, 255, 0.07);
  }
  .login-divider-text {
    font-size: 0.78rem;
    color: #3a3a4a;
    white-space: nowrap;
  }

  .social-btns {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }
  .social-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    background: #111118;
    border: 1.5px solid rgba(255, 255, 255, 0.08);
    border-radius: 11px;
    color: #a0a0b0;
    font-size: 0.82rem;
    font-weight: 600;
    padding: 11px 10px;
    cursor: pointer;
    transition:
      border-color 0.2s,
      color 0.2s,
      transform 0.15s;
    font-family: "DM Sans", sans-serif;
  }
  .social-btn:hover {
    border-color: rgba(250, 204, 21, 0.3);
    color: #f0f0f5;
    transform: translateY(-1px);
    box-shadow: none;
    background: rgba(250, 204, 21, 0.04);
  }

  .login-footer-note {
    font-size: 0.75rem;
    color: #3a3a4a;
    text-align: center;
    line-height: 1.6;
  }
</style>

<script>
  function togglePassword() {
    const input = document.getElementById("passwordInput");
    const icon = document.getElementById("eyeIcon");
    if (input.type === "password") {
      input.type = "text";
      icon.textContent = "visibility_off";
    } else {
      input.type = "password";
      icon.textContent = "visibility";
    }
  }
</script>

{% endblock %}
